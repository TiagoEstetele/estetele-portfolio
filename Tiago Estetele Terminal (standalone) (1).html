  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

uch file or directory: {{ missingPath }}<\u002Fdiv>\n            <div><span style=\"color: #565650;\">$<\u002Fspan> echo $?<\u002Fdiv>\n            <div style=\"color: #4ade80;\">404<\u002Fdiv>\n          <\u002Fdiv>\n          <h1 style=\"font-size: clamp(64px, 12vw, 110px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; margin: 28px 0 0;\">404<span style=\"color: #4ade80;\">.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size: 16px; line-height: 1.65; color: #8a8a84; margin: 16px 0 0; max-width: 400px;\">{{ t.notFound }}<\u002Fp>\n          <div style=\"margin-top: 28px;\">\n            <button onclick=\"{{ goHome }}\" style=\"display: inline-flex; align-items: center; gap: 8px; background: #4ade80; color: #050505; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 7px; border: none; cursor: pointer; transition: transform 0.18s ease, background 0.2s ease, box-shadow 0.3s ease;\" style-hover=\"background: #86efac; transform: translateY(-2px); box-shadow: 0 10px 34px rgba(74,222,128,0.28);\" style-active=\"transform: scale(0.96); background: #3ec46e;\">cd ~/home<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CONTACT -->\n      <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-screen-label=\"Contact\" style=\"text-align: center; padding: 24px 0;\">\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4ade80; letter-spacing: 0.08em;\">05 / {{ t.contactPill }}<\u002Fdiv>\n          <h2 style=\"font-size: clamp(28px, 4.5vw, 44px); font-weight: 600; letter-spacing: -0.03em; margin: 18px auto 0; max-width: 540px; text-wrap: balance;\">{{ t.contactHeadline }}<\u002Fh2>\n          <p style=\"font-size: 15px; color: #8a8a84; margin: 14px auto 0; max-width: 400px; line-height: 1.6;\">{{ t.contactSub }}<\u002Fp>\n          <div style=\"display: flex; justify-content: center; margin-top: 30px;\">\n            <a href=\"mailto:hello@tiagoestetele.dev\" style=\"display: inline-flex; align-items: center; gap: 8px; background: #4ade80; color: #050505; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; padding: 13px 26px; border-radius: 7px; transition: transform 0.18s ease, background 0.2s ease, box-shadow 0.3s ease;\" style-hover=\"background: #86efac; color: #050505; transform: translateY(-2px); box-shadow: 0 10px 34px rgba(74,222,128,0.28);\" style-active=\"transform: scale(0.96); background: #3ec46e; color: #050505;\">{{ t.ctaContact }} →<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: center; gap: 24px; margin-top: 30px; flex-wrap: wrap;\">\n            <a href=\"mailto:hello@tiagoestetele.dev\" style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6b6b65;\" style-hover=\"color: #4ade80;\">hello@tiagoestetele.dev<\u002Fa>\n            <a href=\"https://github.com\" target=\"_blank\" style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6b6b65;\" style-hover=\"color: #4ade80;\">github<\u002Fa>\n            <a href=\"https://linkedin.com\" target=\"_blank\" style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6b6b65;\" style-hover=\"color: #4ade80;\">linkedin<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- prompt / command line -->\n    <div style=\"border-top: 1px solid #141414; background: #090909; padding: 12px 18px; flex-shrink: 0;\">\n      <sc-if value=\"{{ hasOutput }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: {{ outputColor }}; margin-bottom: 8px; white-space: pre-wrap; line-height: 1.7;\">{{ output }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px;\">\n        <span style=\"color: #4ade80;\">tiago@estetele<\u002Fspan>\n        <span style=\"color: #565650;\">~/{{ page }}<\u002Fspan>\n        <span style=\"color: #565650;\">$<\u002Fspan>\n        <span style=\"color: #e8e8e5; white-space: pre;\">{{ typed }}<\u002Fspan>\n        <span style=\"display: inline-block; width: 8px; height: 15px; background: #4ade80; animation: blink 1.1s step-end infinite; flex-shrink: 0;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- status bar -->\n    <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 7px 14px; border-top: 1px solid #141414; background: #0b0b0b; flex-shrink: 0; flex-wrap: wrap;\">\n      <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #33332f;\">⎇ main · sha 7f3a2c1 · uptime {{ uptime }}<\u002Fspan>\n      <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #33332f;\">{{ t.footerHint }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    now: new Date(),\n    booted: Date.now(),\n    lang: (localStorage.getItem(\"te-portfolio-lang\") || \"en\"),\n    page: \"home\",\n    typed: \"\",\n    animating: false,\n    contentIn: true,\n    output: \"\",\n    outputColor: \"#6b6b65\",\n    windowIn: false,\n    booting: true,\n    bootStep: 0,\n    missingPath: \"~/void\"\n  };\n\n  BOOT_LINES = [\n    { tag: \"[ OK ]\", text: \"boot sequence initialized\", color: \"#9a9a94\" },\n    { tag: \"[ OK ]\", text: \"mounting /dev/portfolio\", color: \"#9a9a94\" },\n    { tag: \"[ OK ]\", text: \"loading modules: react · next · typescript\", color: \"#9a9a94\" },\n    { tag: \"[ OK ]\", text: \"connecting to tiagoestetele.dev ... 200\", color: \"#9a9a94\" },\n    { tag: \"[ OK ]\", text: \"env: remote · brazil · utc-3\", color: \"#9a9a94\" },\n    { tag: \"$\", text: \"./portfolio --start\", color: \"#e8e8e5\" }\n  ];\n\n  constructor(props) {\n    super(props);\n    this.bgRef = React.createRef();\n    this.cursorDotRef = React.createRef();\n    this.cursorRingRef = React.createRef();\n    this.PAGES = [\"home\", \"about\", \"stack\", \"projects\", \"experience\", \"contact\"];\n    this._mouse = { x: -9999, y: -9999, sx: -9999, sy: -9999, rx: -9999, ry: -9999, seen: false, hover: false };\n  }\n\n  componentDidMount() {\n    this._t = setInterval(() => this.setState({ now: new Date() }), 1000);\n    this._onKey = (e) => this._handleKey(e);\n    window.addEventListener(\"keydown\", this._onKey);\n    const reduced = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n    if (!reduced) {\n      this._setupCanvas();\n      this._setupCursor();\n    }\n    if (reduced) {\n      this.setState({ windowIn: true, booting: false });\n      return;\n    }\n    // window open animation, then boot log\n    requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ windowIn: true })));\n    let step = 0;\n    const nextLine = () => {\n      step++;\n      this.setState({ bootStep: step });\n      if (step < this.BOOT_LINES.length) {\n        this._bootT = setTimeout(nextLine, 170 + Math.random() * 200);\n      } else {\n        this._bootT = setTimeout(() => {\n          this.setState({ booting: false, contentIn: false });\n          setTimeout(() => this.setState({ contentIn: true }), 60);\n        }, 520);\n      }\n    };\n    this._bootT = setTimeout(nextLine, 650);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._t);\n    clearInterval(this._typer);\n    clearTimeout(this._bootT);\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener(\"keydown\", this._onKey);\n    window.removeEventListener(\"resize\", this._onResize);\n    window.removeEventListener(\"mousemove\", this._onMove);\n    window.removeEventListener(\"mouseout\", this._onOut);\n  }\n\n  _handleKey(e) {\n    if (e.metaKey || e.ctrlKey || e.altKey) return;\n    if (this.state.animating) return;\n    if (e.key === \"Enter\") {\n      this._execute(this.state.typed.trim());\n      return;\n    }\n    if (e.key === \"Backspace\") {\n      this.setState((s) => ({ typed: s.typed.slice(0, -1) }));\n      e.preventDefault();\n      return;\n    }\n    if (e.key.length === 1) {\n      this.setState((s) => ({ typed: s.typed + e.key }));\n      e.preventDefault();\n    }\n  }\n\n  _navigate(page) {\n    if (this.state.animating || page === this.state.page) return;\n    const cmd = \"cd ~/\" + page;\n    this.setState({ animating: true, typed: \"\", output: \"\" });\n    let i = 0;\n    clearInterval(this._typer);\n    this._typer = setInterval(() => {\n      i++;\n      this.setState({ typed: cmd.slice(0, i) });\n      if (i >= cmd.length) {\n        clearInterval(this._typer);\n        setTimeout(() => {\n          this.setState({ contentIn: false });\n          setTimeout(() => {\n            this.setState({ page, typed: \"\", animating: false, contentIn: true });\n          }, 240);\n        }, 220);\n      }\n    }, 42);\n  }\n\n  _execute(raw) {\n    if (!raw) return;\n    const lang = this.state.lang;\n    const parts = raw.toLowerCase().split(/\\s+/);\n    const cmd = parts[0];\n    const arg = (parts[1] || \"\").replace(\"~/\", \"\").replace(/^\\//, \"\");\n    const say = (output, outputColor) => this.setState({ typed: \"\", output, outputColor: outputColor || \"#6b6b65\" });\n\n    if (cmd === \"cd\") {\n      const target = arg === \"\" || arg === \"~\" ? \"home\" : arg;\n      if (this.PAGES.includes(target)) {\n        this.setState({ typed: \"\", output: \"\", contentIn: false });\n        setTimeout(() => this.setState({ page: target, contentIn: true }), 240);\n      } else {\n        // unknown route → 404 page inside the terminal\n        this.setState({ typed: \"\", output: \"\", missingPath: \"~/\" + (arg || \"?\"), contentIn: false });\n        setTimeout(() => this.setState({ page: \"404\", contentIn: true }), 240);\n      }\n    } else if (cmd === \"ls\") {\n      say(this.PAGES.map((p) => p + \"/\").join(\"  \"), \"#9a9a94\");\n    } else if (cmd === \"help\") {\n      say(lang === \"br\"\n        ? \"comandos: cd <página> · ls · whoami · lang en|br · clear\\npáginas: \" + this.PAGES.join(\", \")\n        : \"commands: cd <page> · ls · whoami · lang en|br · clear\\npages: \" + this.PAGES.join(\", \"), \"#9a9a94\");\n    } else if (cmd === \"whoami\") {\n      say(\"Tiago Estetele — \" + (lang === \"br\" ? \"desenvolvedor web · especialista em front-end\" : \"web developer · front-end specialist\"), \"#9a9a94\");\n    } else if (cmd === \"lang\") {\n      if (arg === \"en\" || arg === \"br\") {\n        localStorage.setItem(\"te-portfolio-lang\", arg);\n        this.setState({ lang: arg, typed: \"\", output: \"\" });\n      } else {\n        say(\"usage: lang en|br\", \"#f87171\");\n      }\n    } else if (cmd === \"clear\") {\n      this.setState({ typed: \"\", output: \"\" });\n    } else if (cmd === \"sudo\") {\n      say(lang === \"br\" ? \"nice try. 😏 permissão negada.\" : \"nice try. 😏 permission denied.\", \"#f87171\");\n    } else {\n      say(\"zsh: command not found: \" + cmd + (lang === \"br\" ? \" — digite 'help'\" : \" — type 'help'\"), \"#f87171\");\n    }\n  }\n\n  _setupCursor() {\n    if (!window.matchMedia(\"(pointer: fine)\").matches) return;\n    const m = this._mouse;\n    this._onMove = (e) => {\n      m.x = e.clientX;\n      m.y = e.clientY;\n      if (!m.seen) { m.sx = m.rx = m.x; m.sy = m.ry = m.y; m.seen = true; }\n      const el = e.target && e.target.closest ? e.target.closest(\"button, a\") : null;\n      if (!!el !== m.hover) {\n        m.hover = !!el;\n        const ring = this.cursorRingRef.current;\n        if (ring) {\n          ring.style.width = m.hover ? \"48px\" : \"34px\";\n          ring.style.height = m.hover ? \"48px\" : \"34px\";\n          ring.style.margin = m.hover ? \"-24px 0 0 -24px\" : \"-17px 0 0 -17px\";\n          ring.style.borderColor = m.hover ? \"rgba(134,239,172,0.9)\" : \"rgba(74,222,128,0.55)\";\n          ring.style.background = m.hover ? \"rgba(74,222,128,0.08)\" : \"transparent\";\n        }\n      }\n    };\n    this._onOut = (e) => {\n      if (e.relatedTarget) return;\n      m.seen = false;\n      const dot = this.cursorDotRef.current, ring = this.cursorRingRef.current;\n      if (dot) dot.style.opacity = \"0\";\n      if (ring) ring.style.opacity = \"0\";\n    };\n    window.addEventListener(\"mousemove\", this._onMove);\n    window.addEventListener(\"mouseout\", this._onOut);\n  }\n\n  _updateCursor() {\n    const m = this._mouse;\n    if (!m.seen) return;\n    // dot follows tightly, ring trails softly\n    m.sx += (m.x - m.sx) * 0.35;\n    m.sy += (m.y - m.sy) * 0.35;\n    m.rx += (m.x - m.rx) * 0.14;\n    m.ry += (m.y - m.ry) * 0.14;\n    const dot = this.cursorDotRef.current, ring = this.cursorRingRef.current;\n    if (dot) {\n      dot.style.opacity = \"1\";\n      dot.style.transform = \"translate3d(\" + m.sx.toFixed(1) + \"px,\" + m.sy.toFixed(1) + \"px,0)\";\n    }\n    if (ring) {\n      ring.style.opacity = \"1\";\n      ring.style.transform = \"translate3d(\" + m.rx.toFixed(1) + \"px,\" + m.ry.toFixed(1) + \"px,0)\";\n    }\n  }\n\n  _setupCanvas() {\n    const canvas = this.bgRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext(\"2d\");\n    const CHARS = \"01+=≡#*·:\";\n    const CW = 16, CH = 22;\n    let cols = 0, rows = 0, cells = [];\n    const resize = () => {\n      canvas.width = window.innerWidth * window.devicePixelRatio;\n      canvas.height = window.innerHeight * window.devicePixelRatio;\n      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);\n      cols = Math.ceil(window.innerWidth / CW);\n      rows = Math.ceil(window.innerHeight / CH);\n      cells = [];\n      for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) cells.push({ x, y, c: CHARS[Math.floor(Math.random() * CHARS.length)], p: Math.random() * Math.PI * 2 });\n    };\n    this._onResize = resize;\n    window.addEventListener(\"resize\", resize);\n    resize();\n    ctx.textBaseline = \"top\";\n    let last = 0;\n    const m = this._mouse;\n    const R = 240; // mouse glow radius\n    const loop = (t) => {\n      this._raf = requestAnimationFrame(loop);\n      this._updateCursor();\n      if (t - last < 50) return;\n      last = t;\n      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);\n      ctx.font = \"12px 'JetBrains Mono', monospace\";\n      const time = t * 0.00012;\n      const hasMouse = m.seen;\n      for (let i = 0; i < cells.length; i++) {\n        const c = cells[i];\n        const px = c.x * CW, py = c.y * CH;\n        // mouse proximity glow (uses the smoothed trailing position)\n        let glow = 0;\n        if (hasMouse) {\n          const dx = px + CW / 2 - m.rx, dy = py + CH / 2 - m.ry;\n          const dist = Math.sqrt(dx * dx + dy * dy);\n          if (dist < R) {\n            const f = 1 - dist / R;\n            glow = f * f * 0.5;\n          }\n        }\n        const n = Math.sin(c.x * 0.14 + time * 3.1) + Math.sin(c.y * 0.19 - time * 2.3) + Math.sin((c.x + c.y) * 0.07 + time * 1.7);\n        let a = 0;\n        if (n >= 0.9) a = Math.min(0.34, (n - 0.9) * 0.24) * (0.7 + 0.3 * Math.sin(c.p + t * 0.001));\n        a = Math.min(0.6, a + glow * (0.35 + 0.35 * ((n + 3) / 6)));\n        if (a < 0.015) continue;\n        if (Math.random() < (glow > 0.05 ? 0.02 : 0.002)) c.c = CHARS[Math.floor(Math.random() * CHARS.length)];\n        ctx.fillStyle = \"rgba(74, 222, 128, \" + a.toFixed(3) + \")\";\n        ctx.fillText(c.c, c.x * CW, c.y * CH);\n      }\n    };\n    this._raf = requestAnimationFrame(loop);\n  }\n\n  renderVals() {\n    const pad = (n) => String(n).padStart(2, \"0\");\n    const d = this.state.now;\n    const clock = pad(d.getHours()) + \":\" + pad(d.getMinutes()) + \":\" + pad(d.getSeconds());\n    const se
